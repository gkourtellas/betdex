services:
  trading-bot:
    build: .
    container_name: betdex_trading_bot
    restart: "no"
    env_file:
      - .env
    environment:
      - LOG_DIR=/app/logs
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: betdex_dashboard
    restart: "no"
    command: ["python", "-u", "src/dashboard.py"]
    ports:
      - "8051:8051"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
